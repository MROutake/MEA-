; Referenz-Umgebung für das Integrationsbeispiel (nicht Teil der CI).
; Eine WS500/W5500-Ethernet-Library ergänzen, die EthernetClient bereitstellt.
[env:nano33ble_pipeline_595_net]
platform = nordicnrf52
board = nano33ble
framework = arduino
monitor_speed = 115200
lib_deps =
    mea-core=symlink://../../../mea-core
    mea-processing=symlink://../../../mea-processing
    mea-managers=symlink://../../../mea-managers
    mea-state-machine=symlink://../../../mea-state-machine
    mea-device-74hc595=symlink://../../../mea-device-74hc595
    mea-protocol=symlink://../../../mea-protocol
    mea-network-core=symlink://../../../mea-network-core
    mea-network-ws500=symlink://../..
    ; + Ethernet-Library nach Wahl (z. B. arduino-libraries/Ethernet)
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
