; ESP-NOW-Server-Beispiel: wartet auf Sensor-Clients und gibt empfangene
; Messwert-Frames auf Serial aus. Fuer ESP32-C3 Super Mini (USB-CDC);
; fuer klassische DevKits das env kopieren und board/build_flags anpassen.

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_ldf_mode = deep+
lib_deps =
    mea-core=symlink://../../../mea-core
    mea-communication=symlink://../../../mea-communication
    mea-espnow=symlink://../..
