[platformio]
default_envs = esp32dev

; Gemeinsame Abhängigkeiten (symlink für lokale Entwicklung; Release-Variante
; mit getaggten Git-Versionen siehe README "Releases").
[env]
lib_deps =
    mea-core=symlink://../mea-core
    mea-processing=symlink://../mea-processing
    mea-managers=symlink://../mea-managers
    mea-state-machine=symlink://../mea-state-machine
    mea-device-analog-input=symlink://../mea-device-analog-input
    mea-communication=symlink://../mea-communication
    mea-output=symlink://../mea-output
lib_ldf_mode = deep+
build_unflags = -std=gnu++11

; Native Tests: komplette Pipeline mit Fakes, strikte Warnungen + Sanitizer.
; src/ wird nicht mitgebaut (Application benötigt Arduino).
; Zusätzlich zum Basis-Stack die Netzwerk-Libraries (nur nativ; die
; Hardware-Envs unten definieren lib_deps eigenständig und bleiben unberührt).
[env:native]
platform = native
test_framework = unity
test_filter = native/*
test_build_src = no
lib_deps =
    ${env.lib_deps}
    mea-protocol=symlink://../mea-protocol
    mea-network-core=symlink://../mea-network-core
    mea-network-ws500=symlink://../mea-network-ws500
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wpedantic
    -Wconversion
    -Wshadow
    -Werror
    -Wno-error=sign-conversion
    -fsanitize=address,undefined
    -fno-omit-frame-pointer

[env:native_debug]
extends = env:native
build_type = debug

; ESP32-Firmware. Strikte Zusatzflags gelten nur für eigenen Code
; (build_src_flags). Dokumentierte Ausnahme (ADR 0002): -Wconversion ist auf
; ESP32 nicht aktivierbar, da bereits Arduino-Framework-Header (WString.h)
; die Warnung auslösen; -Wconversion wird für alle Libraries nativ erzwungen.
[env:esp32dev]
platform = platformio/espressif32 @ 7.0.1
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
build_src_flags =
    -Wshadow
    -Werror
check_tool = cppcheck
check_flags =
    cppcheck: --enable=warning,style,performance,portability --inline-suppr

[env:esp32dev_test]
extends = env:esp32dev
test_framework = unity
test_filter = embedded/*
test_build_src = no

[env:esp32dev_release]
extends = env:esp32dev
build_type = release
build_flags =
    ${env:esp32dev.build_flags}
    -DNDEBUG

; Manueller Hardwaretest: 74HC595 Lauflicht auf Arduino Nano 33 BLE.
[env:nano33ble_runlight]
platform = nordicnrf52
board = nano33ble
framework = arduino
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
build_src_filter =
    -<*>
    +<main_runlight_nano33ble.cpp>

[env:nano33ble_pipeline_595]
platform = nordicnrf52
board = nano33ble
framework = arduino
monitor_speed = 115200
lib_deps =
    mea-core=symlink://../mea-core
    mea-processing=symlink://../mea-processing
    mea-managers=symlink://../mea-managers
    mea-state-machine=symlink://../mea-state-machine
    mea-device-analog-input=symlink://../mea-device-analog-input
    mea-communication=symlink://../mea-communication
    mea-output=symlink://../mea-output
    mea-device-74hc595=symlink://../mea-device-74hc595
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
build_src_filter =
    -<*>
    +<main_pipeline_595_nano33ble.cpp>
